# =============================================================================
# Secrets - Sensitive Configuration
# =============================================================================
# NOTE: In production, use a secrets management system like:
# - AWS Secrets Manager
# - HashiCorp Vault
# - Sealed Secrets
# - External Secrets Operator
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: chatbot-secrets
  namespace: chatbot-platform
  labels:
    app.kubernetes.io/name: chatbot-platform
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database
  POSTGRES_USER: "chatbot_user"
  POSTGRES_PASSWORD: "change-me-in-production"
  DATABASE_URL: "postgresql://chatbot_user:change-me-in-production@postgres:5432/chatbot"
  
  # Redis
  REDIS_PASSWORD: "change-me-in-production"
  
  # AWS
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  
  # Security
  JWT_SECRET: "change-me-in-production-jwt-secret"
  ENCRYPTION_KEY: "change-me-in-production-encryption-key-32"
  FIELD_ENCRYPTION_KEY: "change-me-in-production-field-key-32"
  HMAC_SECRET: "change-me-in-production-hmac-secret"
  
  # n8n
  N8N_BASIC_AUTH_USER: "admin"
  N8N_BASIC_AUTH_PASSWORD: "change-me-in-production"
  N8N_ENCRYPTION_KEY: "change-me-in-production-n8n-key"
  N8N_API_KEY: "change-me-in-production-n8n-api-key"
  
  # Upload webhook
  UPLOAD_WEBHOOK_SECRET: "change-me-in-production-webhook-secret"
---
# =============================================================================
# TLS Secret (for ingress)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: chatbot-tls
  namespace: chatbot-platform
  labels:
    app.kubernetes.io/name: chatbot-platform
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
data:
  tls.crt: ""
  tls.key: ""
