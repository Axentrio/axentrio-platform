name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: chatbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/chatbot_test
      JWT_SECRET: test-jwt-secret-for-ci
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      NODE_ENV: test
      CLERK_SECRET_KEY: test_clerk_key
      CLERK_WEBHOOK_SECRET: test_webhook_secret
      SUPER_ADMIN_EMAILS: test@example.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chatbot-platform/api/package-lock.json

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install API dependencies
        working-directory: chatbot-platform/api
        run: npm ci

      - name: Install Portal dependencies
        working-directory: chatbot-platform/portal
        run: pnpm install --frozen-lockfile

      - name: Type-check API
        working-directory: chatbot-platform/api
        run: npx tsc --noEmit

      - name: Type-check Portal
        working-directory: chatbot-platform/portal
        run: pnpm exec tsc --noEmit

      - name: Run API tests
        working-directory: chatbot-platform/api
        run: npx vitest run

      - name: Build Portal
        working-directory: chatbot-platform/portal
        run: pnpm run build
