services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: handsoff-pg
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: chatbot_platform
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - handsoff_pgdata:/var/lib/postgresql/data

volumes:
  handsoff_pgdata:
