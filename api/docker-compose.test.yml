version: '3.8'
services:
  test-db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: chatbot_test
    ports:
      - '5433:5432'
    # Reclaim-aggressive tuning so a long full run can't exhaust the RAM-backed
    # PGDATA. The per-test TRUNCATE-of-all-tables allocates a fresh relfilenode
    # per table; the dropped files are only physically unlinked at CHECKPOINT, so
    # over 1500+ tests they pile up faster than the default 5-min checkpoint
    # reclaims them → "No space left on device", whose failed TRUNCATE then
    # cascades into duplicate-key errors. Frequent checkpoints + a small WAL
    # ceiling keep tmpfs usage bounded well under the Docker VM's RAM (the tmpfs
    # `size` is only a ceiling — the real limit is VM memory, ~3.8GiB here).
    # fsync/full-page writes off purely for speed (ephemeral DB). Paired with
    # maxWorkers in vitest.config.ts. Local-only; CI uses a disk-backed postgres.
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - full_page_writes=off
      - -c
      - synchronous_commit=off
      - -c
      - max_wal_size=512MB
      - -c
      - min_wal_size=80MB
      - -c
      - checkpoint_timeout=30s
      - -c
      - checkpoint_completion_target=0.7
    tmpfs:
      - /var/lib/postgresql/data:size=8g
