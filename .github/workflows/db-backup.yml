name: Database Backup

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create database backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
          FILENAME="backup_${TIMESTAMP}.sql.gz"
          pg_dump "$DATABASE_URL" | gzip > "$FILENAME"
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          echo "Backup created: $FILENAME ($(du -h "$FILENAME" | cut -f1))"

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp "$FILENAME" "s3://chatbot-db-backups/$FILENAME" \
            --endpoint-url "$R2_ENDPOINT"
          echo "Uploaded $FILENAME to R2"

      - name: Cleanup old backups (keep last 30 days)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          CUTOFF_DATE=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          aws s3 ls "s3://chatbot-db-backups/" --endpoint-url "$R2_ENDPOINT" | while read -r line; do
            FILE_DATE=$(echo "$line" | awk '{print $1}')
            FILE_NAME=$(echo "$line" | awk '{print $4}')
            if [[ "$FILE_DATE" < "$CUTOFF_DATE" && -n "$FILE_NAME" ]]; then
              aws s3 rm "s3://chatbot-db-backups/$FILE_NAME" --endpoint-url "$R2_ENDPOINT"
              echo "Deleted old backup: $FILE_NAME"
            fi
          done
