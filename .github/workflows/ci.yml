name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: chatbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/chatbot_test
      DATABASE_URL: postgresql://test:test@localhost:5432/chatbot_test
      JWT_SECRET: test-jwt-secret-for-ci
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      NODE_ENV: test
      CLERK_SECRET_KEY: test_clerk_key
      CLERK_WEBHOOK_SECRET: test_webhook_secret
      SUPER_ADMIN_EMAILS: test@example.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            chatbot-platform/api/package-lock.json
            chatbot-platform/portal/package-lock.json

      - name: Install API dependencies
        working-directory: chatbot-platform/api
        run: npm ci

      - name: Install Portal dependencies
        working-directory: chatbot-platform/portal
        run: npm ci

      - name: Type-check API
        working-directory: chatbot-platform/api
        run: npx tsc --noEmit

      - name: Type-check Portal
        working-directory: chatbot-platform/portal
        run: npx tsc --noEmit

      - name: Run API tests
        working-directory: chatbot-platform/api
        run: npx vitest run

      - name: Build Portal
        working-directory: chatbot-platform/portal
        run: npm run build

  deploy-api:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chatbot-platform/api/package-lock.json

      - name: Install dependencies and build
        working-directory: chatbot-platform/api
        run: npm ci && npm run build

      - name: Upload source maps to Sentry
        continue-on-error: true
        working-directory: chatbot-platform/api
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          npx @sentry/cli sourcemaps upload ./dist --release="$GITHUB_SHA"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: chatbot-platform
        run: railway up --service chatbot-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-portal:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: chatbot-platform
        run: railway up --service chatbot-portal --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
